name: Build On Demand

# Manual trigger only — never runs automatically on push.
# Use this workflow to build and test images from any branch
# without pushing to DockerHub.
#
# See docs/BUILD_ON_DEMAND.md for usage guide.

on:
  workflow_dispatch:
    inputs:
      variants:
        description: |
          Build chains to build, one per line (space-separated chain per line).
          Example: "cli appsec" builds the base→cli→appsec chain.
          Leave empty to build all variants from the variants file.
        required: false
        default: ''
      test_files:
        description: |
          Comma-separated test files to run (e.g. "test.bats").
          Leave empty to skip tests entirely.
        required: false
        default: 'test.bats'
      test_image:
        description: |
          Docker image name to run tests against (without tag suffix).
          Defaults to "akamai/shell". Only relevant when test_files is set.
        required: false
        default: 'akamai/shell'
      push:
        description: 'Push built images to DockerHub after a successful build'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build variants
        env:
          VARIANTS: ${{ inputs.variants }}
        run: |
          if [ -z "$VARIANTS" ]; then
            echo "No variants specified — building all from variants file"
            ./scripts/build-all.sh
          else
            echo "Building selected variant chains"
            while IFS= read -r chain; do
              [ -n "$chain" ] && ./scripts/build-chain.sh $chain
            done <<< "$VARIANTS"
          fi
        shell: bash

      - name: Run tests
        if: ${{ inputs.test_files != '' }}
        env:
          TEST_IMAGE: ${{ inputs.test_image }}
          TEST_FILES: ${{ inputs.test_files }}
        run: ./scripts/test.sh
        shell: bash

      - name: Push to DockerHub
        if: ${{ inputs.push == true }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: ./scripts/push-all.sh
        shell: bash
